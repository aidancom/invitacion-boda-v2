<svg xmlns="http://www.w3.org/2000/svg"
viewBox="0 0 1000 700"
preserveAspectRatio="none">

    <defs>

        <style>

            .line{
                fill:none;
                stroke:#9b9575;
                stroke-width:1.4;
            }

            .thin{
                fill:none;
                stroke:#9b9575;
                stroke-width:.8;
            }

        </style>

    </defs>

    <!-- líneas -->

    <line class="line" x1="80" y1="40" x2="920" y2="40"/>

    <line class="line" x1="40" y1="80" x2="40" y2="620"/>

    <line class="line" x1="960" y1="80" x2="960" y2="620"/>

    <line class="line" x1="80" y1="660" x2="920" y2="660"/>

    <!-- esquina superior izquierda -->

    <path class="thin"
    d="
    M40 80
    C40 40 55 25 90 25

    M55 70
    C55 45 70 40 82 55

    M45 105
    C45 90 58 86 72 86
    "/>

    <circle cx="65" cy="48" r="2" fill="#9b9575"/>

    <!-- esquina inferior derecha -->

    <g transform="translate(1000 700) rotate(180)">

        <path class="thin"
        d="
        M40 80
        C40 40 55 25 90 25

        M55 70
        C55 45 70 40 82 55

        M45 105
        C45 90 58 86 72 86
        "/>

        <circle cx="65" cy="48" r="2" fill="#9b9575"/>

    </g>

</svg>